<div class="register-card">
    <div class="card-title">
        <h1>ورود به حساب</h1>
    </div>
    <p style="color:var(--danger)">{{ error }}</p>
    <form method="POST" action="/dex_1/login">
        <div class="field"><label>👤 نام کاربری</label>
            <input type="text" name="username" required>
        </div>
        <div class="field"><label>🔒 رمز عبور</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn-submit">🔐 ورود</button>
    </form>
    <p style="margin-top:1rem;">حساب ندارید؟ <a href="/dex_1/register">ثبت‌نام کنید</a></p>
</div>
