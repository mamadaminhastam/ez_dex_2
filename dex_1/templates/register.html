<div class="register-card">
    <div class="card-title">
        <h1>ایجاد حساب کاربری</h1>
    </div>
    <p style="color:var(--danger)">{{ error }}</p>
    <form method="POST" action="/dex_1/register">
        <div class="field"><label>👤 نام کاربری <span class="required">*</span></label>
            <input type="text" name="username" required placeholder="مثال: satoshi">
        </div>
        <div class="field"><label>📧 ایمیل <span class="required">*</span></label>
            <input type="email" name="email" required placeholder="your@email.com">
        </div>
        <div class="field"><label>🔒 رمز عبور <span class="required">*</span></label>
            <input type="password" name="password" required>
        </div>
        <div class="field"><label>🔒 تکرار رمز عبور <span class="required">*</span></label>
            <input type="password" name="password_confirm" required>
        </div>
        <button type="submit" class="btn-submit">✅ ثبت‌نام</button>
    </form>
    <p style="margin-top:1rem;">حساب دارید؟ <a href="/dex_1/login">وارد شوید</a></p>
</div>
