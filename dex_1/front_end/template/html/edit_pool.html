<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ویرایش استخر | Ez Dex</title>
    <link rel="stylesheet" href="/dex_1/static/css/main.css">
    <link rel="stylesheet" href="/dex_1/static/css/create_pool.css">
    <style>
        .pool-card {
            max-width: 600px;
            margin: 0 auto;
        }

        .status-message {
            margin-top: 1rem;
        }

        .loading {
            text-align: center;
            color: var(--text-muted);
            padding: 2rem;
        }
    </style>
</head>

<body>
    <div class="dex-container">
        <!-- هدر یکسان -->
        <header class="dex-header">
            <div class="logo">
                <span></span>
                <span>Ez<span class="highlight">Dex</span></span>
            </div>
            <nav class="main-nav">
                <a href="/dex_1/">🏠 خانه</a>
                <a href="/dex_1/contact">📞 تماس</a>
                <a href="/dex_1/register">📝 ثبت‌نام</a>
                <a href="/dex_1/create_pool">➕ استخر جدید</a>
                <a href="/dex_1/catalog">🛒 کاتالوگ</a>
            </nav>
            <button class="connect-wallet-btn" onclick="alert('اتصال ولت در این صفحه ضروری نیست')">
                <span>🔗</span> <span>اتصال کیف پول</span>
            </button>
        </header>

        <main>
            <div class="pool-card">
                <div class="title">
                    <h2>✏️ ویرایش استخر نقدینگی</h2>
                    <p>شناسه استخر: <strong id="poolIdDisplay">---</strong></p>
                </div>
                <div id="loadingMsg" class="loading">در حال بارگیری اطلاعات...</div>

                <form id="editForm" style="display: none;">
                    <input type="hidden" id="poolId">

                    <div class="field">
                        <label>🪙 آدرس توکن اول <span class="required">*</span></label>
                        <input type="text" id="token0" required>
                    </div>
                    <div class="field">
                        <label>🪙 آدرس توکن دوم <span class="required">*</span></label>
                        <input type="text" id="token1" required>
                    </div>
                    <div class="field">
                        <label>💰 نرخ اولیه <span class="required">*</span></label>
                        <input type="text" id="initialRate" required>
                    </div>
                    <div class="field">
                        <label>💧 نقدینگی اولیه</label>
                        <input type="text" id="initialLiquidity">
                    </div>
                    <div class="field">
                        <label>🏷️ نماد توکن اول</label>
                        <input type="text" id="symbol0">
                    </div>
                    <div class="field">
                        <label>🏷️ نماد توکن دوم</label>
                        <input type="text" id="symbol1">
                    </div>
                    <div class="field">
                        <label>🔗 آدرس ولت سازنده</label>
                        <input type="text" id="creatorWallet" placeholder="0x...">
                    </div>
                    <div class="field">
                        <label>وضعیت</label>
                        <select id="isActive">
                            <option value="1">فعال</option>
                            <option value="0">غیرفعال</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-submit">💾 ذخیره تغییرات</button>
                    <div id="formStatus" class="status-message"></div>
                </form>
            </div>
        </main>

        <!-- فوتر یکسان -->
        <footer class="dex-footer">
            <p>© 2025 Ez Dex - تمامی حقوق محفوظ است.</p>
            <div class="footer-links">
                <a href="#">شرایط استفاده</a>
                <a href="#">حریم خصوصی</a>
                <a href="#">قراردادهای هوشمند</a>
            </div>
        </footer>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const poolId = urlParams.get('id') || 1;

        document.getElementById('poolId').value = poolId;
        document.getElementById('poolIdDisplay').textContent = poolId;

        async function loadPool() {
            const loading = document.getElementById('loadingMsg');
            const form = document.getElementById('editForm');
            try {
                const res = await fetch(`/dex_1/api/pool/${poolId}`);
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || 'خطا در دریافت اطلاعات');
                }
                const pool = await res.json();

                document.getElementById('token0').value = pool.token0_address || '';
                document.getElementById('token1').value = pool.token1_address || '';
                document.getElementById('initialRate').value = pool.initial_rate || '';
                document.getElementById('initialLiquidity').value = pool.initial_liquidity || '';
                document.getElementById('symbol0').value = pool.token0_symbol || '';
                document.getElementById('symbol1').value = pool.token1_symbol || '';
                document.getElementById('creatorWallet').value = pool.creator_wallet || '';
                document.getElementById('isActive').value = pool.is_active ? '1' : '0';

                loading.style.display = 'none';
                form.style.display = 'block';
            } catch (err) {
                loading.innerHTML = `<div style="color:red">❌ ${err.message}</div>`;
            }
        }

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusDiv = document.getElementById('formStatus');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            const payload = {
                id: poolId,
                token0_address: document.getElementById('token0').value.trim(),
                token1_address: document.getElementById('token1').value.trim(),
                initial_rate: document.getElementById('initialRate').value.trim(),
                initial_liquidity: document.getElementById('initialLiquidity').value.trim() || null,
                token0_symbol: document.getElementById('symbol0').value.trim() || null,
                token1_symbol: document.getElementById('symbol1').value.trim() || null,
                creator_wallet: document.getElementById('creatorWallet').value.trim() || null,
                is_active: parseInt(document.getElementById('isActive').value)
            };

            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ در حال ذخیره...';

            try {
                const res = await fetch('/dex_1/api/update_pool', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (res.ok) {
                    statusDiv.innerHTML = '✅ ' + (data.message || 'تغییرات ذخیره شد');
                    statusDiv.className = 'status-message success';
                } else {
                    statusDiv.innerHTML = '❌ ' + (data.error || 'خطا');
                    statusDiv.className = 'status-message error';
                }
            } catch (err) {
                statusDiv.innerHTML = '❌ خطای شبکه';
                statusDiv.className = 'status-message error';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '💾 ذخیره تغییرات';
            }
        });

        loadPool();
    </script>
</body>

</html>
