<!DOCTYPE html>

<html lang="fa" dir="rtl">

<head>

    <meta charset="UTF-8">

    <title>کاتالوگ محصولات | لوازم‌التحریر</title>


    <style>

        body {

            font-family: sans-serif;

            background-color: #f5f5f5;

            margin: 0;

            padding: 0;

        }


        .container {

            width: 90%;

            max-width: 1200px;

            margin: 40px auto;

        }


        h1 {

            text-align: center;

            margin-bottom: 40px;

        }


        /* گرید سه ستونه */

        .product-grid {

            display: grid;

            grid-template-columns: repeat(3, 1fr);

            gap: 25px;

        }


        .product-card {

            background: #ffffff;

            border-radius: 10px;

            box-shadow: 0 0 10px rgba(0,0,0,0.08);

            padding: 15px;

            text-align: center;

            transition: 0.3s;

        }


        .product-card:hover {

            transform: translateY(-5px);

        }


        .product-card img {

            width: 100%;

            height: 200px;

            object-fit: cover;

            border-radius: 8px;

        }


        .product-title {

            font-size: 18px;

            margin: 15px 0 10px;

            font-weight: bold;

        }


        .product-price {

            color: #e74c3c;

            font-size: 16px;

            margin-bottom: 10px;

        }


        .product-desc {

            font-size: 14px;

            color: #555;

            line-height: 1.6;

        }


        .view-btn {

            display: inline-block;

            margin-top: 15px;

            padding: 8px 15px;

            background-color: #3498db;

            color: white;

            border-radius: 5px;

            text-decoration: none;

            font-size: 14px;

        }

        .view-btn.delete{

            background-color: red;

        }

        .view-btn.delete:hover{

            background-color: maroon;

        }


        .view-btn:hover {

            background-color: #2980b9;

        }


        /* ریسپانسیو */

        @media (max-width: 900px) {

            .product-grid {

                grid-template-columns: repeat(2, 1fr);

            }

        }


        @media (max-width: 600px) {

            .product-grid {

                grid-template-columns: 1fr;

            }

        }

    </style>

    <link rel="stylesheet" href="main-nav.css">

</head>


<body>

    <div class="container">

        <h1>کاتالوگ محصولات لوازم‌التحریر</h1>


        <div class="product-grid">

                <!-- کارت محصول -->

            <article class="product-card">

                <img src="" alt="دفتر">

                <h3 class="product-title">مداد سوسماری</h3>

                <p class="product-price"> تومان 123000</p>

                <p class="product-desc"> 

                    هرچی                   

                </p>

            </article>

        </div>

    </div>


</body>

</html>
