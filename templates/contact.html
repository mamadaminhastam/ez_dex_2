<div class="contact-card">
    <div class="card-header">
        <div class="icon">✉️</div>
        <h1>ارسال پیام</h1>
    </div>
    <p style="color:var(--danger)">{{ error }}</p>
    <form method="POST" action="/contact">
        <div class="input-group"><label>📧 ایمیل <span class="required">*</span></label>
            <input type="email" name="email" required>
        </div>
        <div class="input-group"><label>🏷️ موضوع <span class="required">*</span></label>
            <input type="text" name="subject" required>
        </div>
        <div class="input-group"><label>💬 پیام <span class="required">*</span></label>
            <textarea name="message" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn-submit">📤 ارسال</button>
    </form>
</div>
