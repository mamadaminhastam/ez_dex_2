<div class="register-card" style="max-width:600px; margin:0 auto;">
    <div class="card-title">
        <h1>ویرایش کاربر {{ username }}</h1>
    </div>
    <p style="color:var(--danger)">{{ error }}</p>
    <form method="POST" action="/edit_user/{{ id }}">
        <input type="hidden" name="_method" value="PUT">
        <div class="field"><label>👤 نام کاربری</label>
            <input type="text" name="username" value="{{ username }}" required>
        </div>
        <div class="field"><label>📧 ایمیل</label>
            <input type="email" name="email" value="{{ email }}" required>
        </div>
        <div class="field"><label>🎭 نقش</label>
            <select name="role">{{ role_options }}</select>
        </div>
        <button type="submit" class="btn-submit">💾 ذخیره تغییرات</button>
    </form>
</div>
