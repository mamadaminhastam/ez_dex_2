<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود | Ez Dex</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/register.css">
</head>

<body>
    <div class="dex-container">
        <header class="dex-header">
            <div class="logo"><span>Ez<span class="highlight">Dex</span></span></div>
            {{ navigation }}
        </header>
        <main>
            <div class="register-card">
                <div class="card-title">
                    <h1>ورود به حساب</h1>
                </div>
                <p style="color:var(--danger)">{{ error }}</p>
                <form method="POST" action="/login">
                    <div class="field"><label>👤 نام کاربری</label>
                        <input type="text" name="username" required>
                    </div>
                    <div class="field"><label>🔒 رمز عبور</label>
                        <input type="password" name="password" required>
                    </div>
                    <button type="submit" class="btn-submit">🔐 ورود</button>
                </form>
                <p style="margin-top:1rem;">حساب ندارید؟ <a href="/register">ثبت‌نام کنید</a></p>
            </div>
        </main>
        <footer class="dex-footer">
            <p>© 2025 Ez Dex</p>
        </footer>
    </div>
</body>

</html>
