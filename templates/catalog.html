<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کاتالوگ استخرها | Ez Dex</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
    </style>
</head>

<body>
    <div class="dex-container">
        <header class="dex-header">
            <div class="logo"><span>Ez<span class="highlight">Dex</span></span></div>
            {{ navigation }}
        </header>
        <main>
            <h2>📦 استخرهای نقدینگی</h2>
            <div class="catalog-grid">
                {{ pool_cards }}
            </div>
        </main>
        <footer class="dex-footer">
            <p>© 2025 Ez Dex</p>
        </footer>
    </div>
</body>

</html>
