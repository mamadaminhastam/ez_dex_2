<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت استخرها | Ez Dex</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            direction: rtl;
        }

        .data-table th,
        .data-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: right;
        }

        .data-table th {
            background-color: #2a2e3a;
            color: white;
        }
    </style>
</head>

<body>
    <div class="dex-container">
        <header class="dex-header">
            <div class="logo"><span>Ez<span class="highlight">Dex</span></span></div>
            {{ navigation }}
        </header>
        <main>
            <h2>💧 استخرهای نقدینگی</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>توکن اول</th>
                        <th>توکن دوم</th>
                        <th>نرخ</th>
                        <th>نقدینگی</th>
                        <th>فعال</th>
                        <th>عملیات</th>
                    </tr>
                </thead>
                <tbody>{{ pool_rows }}</tbody>
            </table>
            <br><a href="/">🔙 بازگشت</a>
        </main>
        <footer class="dex-footer">
            <p>© 2025 Ez Dex</p>
        </footer>
    </div>
</body>

</html>
