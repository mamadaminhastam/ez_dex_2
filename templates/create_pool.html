<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ایجاد استخر | Ez Dex</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/create_pool.css">
</head>

<body>
    <div class="dex-container">
        <header class="dex-header">
            <div class="logo"><span>Ez<span class="highlight">Dex</span></span></div>
            {{ navigation }}
        </header>
        <main>
            <div class="pool-card">
                <div class="title">
                    <h1>ایجاد استخر نقدینگی جدید</h1>
                </div>
                <p style="color:var(--danger)">{{ error }}</p>
                <form method="POST" action="/create_pool">
                    <div class="field"><label>🪙 آدرس توکن اول <span class="required">*</span></label>
                        <input type="text" name="token0_address" required placeholder="0x...">
                    </div>
                    <div class="field"><label>🪙 آدرس توکن دوم <span class="required">*</span></label>
                        <input type="text" name="token1_address" required placeholder="0x...">
                    </div>
                    <div class="field"><label>🏷️ نماد توکن اول</label>
                        <input type="text" name="token0_symbol" placeholder="ETH">
                    </div>
                    <div class="field"><label>🏷️ نماد توکن دوم</label>
                        <input type="text" name="token1_symbol" placeholder="USDC">
                    </div>
                    <div class="field"><label>💰 نرخ اولیه <span class="required">*</span></label>
                        <input type="text" name="initial_rate" required placeholder="1 ETH = 3000 USDC">
                    </div>
                    <div class="field"><label>💧 نقدینگی اولیه</label>
                        <input type="text" name="initial_liquidity" placeholder="10">
                    </div>
                    <button type="submit" class="btn-submit">✅ ایجاد استخر</button>
                </form>
            </div>
        </main>
        <footer class="dex-footer">
            <p>© 2025 Ez Dex</p>
        </footer>
    </div>
</body>

</html>
