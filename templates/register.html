<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام | Ez Dex</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/register.css">
</head>

<body>
    <div class="dex-container">
        <header class="dex-header">
            <div class="logo"><span>Ez<span class="highlight">Dex</span></span></div>
            {{ navigation }}
        </header>
        <main>
            <div class="register-card">
                <div class="card-title">
                    <h1>ایجاد حساب کاربری</h1>
                </div>
                <p style="color:var(--danger)">{{ error }}</p>
                <form method="POST" action="/register">
                    <div class="field"><label>👤 نام کاربری <span class="required">*</span></label>
                        <input type="text" name="username" required placeholder="مثال: satoshi">
                    </div>
                    <div class="field"><label>📧 ایمیل <span class="required">*</span></label>
                        <input type="email" name="email" required placeholder="your@email.com">
                    </div>
                    <div class="field"><label>🔒 رمز عبور <span class="required">*</span></label>
                        <input type="password" name="password" required>
                    </div>
                    <div class="field"><label>🔒 تکرار رمز عبور <span class="required">*</span></label>
                        <input type="password" name="password_confirm" required>
                    </div>
                    <button type="submit" class="btn-submit">✅ ثبت‌نام</button>
                </form>
                <p style="margin-top:1rem;">حساب دارید؟ <a href="/login">وارد شوید</a></p>
            </div>
        </main>
        <footer class="dex-footer">
            <p>© 2025 Ez Dex</p>
            <div class="footer-links"><a href="#">شرایط</a><a href="#">حریم خصوصی</a></div>
        </footer>
    </div>
</body>

</html>
