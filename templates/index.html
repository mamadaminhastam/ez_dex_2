<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خانه | Ez Dex</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>

<body>
    <div class="dex-container">
        <header class="dex-header">
            <div class="logo"><span>Ez<span class="highlight">Dex</span></span></div>
            {{ navigation }}
        </header>
        <main>
            <div style="text-align:center; padding:4rem 1rem;">
                <h1>{{ message }}</h1>
                <p>صرافی غیرمتمرکز نسل جدید با کارمزد صفر و امنیت بالا.</p>
                <div style="margin-top:2rem;">
                    <a href="/register" class="btn-submit">📝 ثبت‌نام کنید</a>
                    <a href="/login"
                        style="background:var(--card-bg); border:1px solid var(--border); color:var(--text-main); padding:0.8rem 2rem; border-radius:40px; text-decoration:none; font-weight:600;">ورود</a>
                </div>
            </div>
        </main>
        <footer class="dex-footer">
            <p>© 2025 Ez Dex - تمامی حقوق محفوظ است.</p>
            <div class="footer-links">
                <a href="#">شرایط استفاده</a><a href="#">حریم خصوصی</a><a href="#">قراردادهای هوشمند</a>
            </div>
        </footer>
    </div>
</body>

</html>
